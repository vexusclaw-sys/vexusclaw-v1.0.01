services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vexusclaw}
      POSTGRES_USER: ${POSTGRES_USER:-vexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vexus} -d ${POSTGRES_DB:-vexusclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.gateway
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "${VEXUS_GATEWAY_BIND_ADDRESS:-127.0.0.1}:${VEXUS_GATEWAY_BIND_PORT:-4000}:4000"
      - "127.0.0.1:${OPENAI_CHATGPT_OAUTH_LOOPBACK_PORT:-1455}:1455"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - gateway_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  dashboard:
    profiles: ["legacy-next"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dashboard
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "${VEXUS_DASHBOARD_BIND_PORT:-3000}:3000"
    depends_on:
      gateway:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  caddy:
    profiles: ["legacy-next"]
    image: caddy:2.9-alpine
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "${VEXUS_HTTP_BIND_PORT:-80}:80"
      - "${VEXUS_HTTPS_BIND_PORT:-443}:443"
    depends_on:
      dashboard:
        condition: service_healthy
      gateway:
        condition: service_healthy
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  gateway_data:
  caddy_data:
  caddy_config:
