ServerName vexusclaw.fun
ServerAlias www.vexusclaw.fun

Alias /install.sh /opt/vexusclaw/deploy/install.sh
Alias /install-bundle.tar.gz /opt/vexusclaw/deploy/install-bundle.tar.gz

<Directory "/opt/vexusclaw/deploy">
  Require all granted
</Directory>

RewriteEngine On
RewriteCond %{REQUEST_URI} !^/install\.sh$
RewriteCond %{REQUEST_URI} !^/install-bundle\.tar\.gz$
RewriteRule ^/(.*)$ https://vexusclaw.com/$1 [R=301,L]
