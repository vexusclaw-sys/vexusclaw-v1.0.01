ServerName vexusclaw.com
ServerAlias control.vexusclaw.com

DocumentRoot /www/wwwroot/dashboard
DirectoryIndex index.php index.html
Alias /install.sh /opt/vexusclaw/deploy/install.sh
Alias /install-bundle.tar.gz /opt/vexusclaw/deploy/install-bundle.tar.gz

ProxyPreserveHost On
ProxyRequests Off
RequestHeader set X-Forwarded-Proto "https"

<Directory "/www/wwwroot/dashboard">
  AllowOverride All
  Require all granted
</Directory>

<Directory "/opt/vexusclaw/deploy">
  Require all granted
</Directory>

ProxyPass "/api/" "http://127.0.0.1:4000/api/"
ProxyPassReverse "/api/" "http://127.0.0.1:4000/api/"

ProxyPass "/health" "http://127.0.0.1:4000/health"
ProxyPassReverse "/health" "http://127.0.0.1:4000/health"

ProxyPass "/events/" "ws://127.0.0.1:4000/events/"
ProxyPassReverse "/events/" "ws://127.0.0.1:4000/events/"

Header always set X-Frame-Options "SAMEORIGIN"
Header always set X-Content-Type-Options "nosniff"
